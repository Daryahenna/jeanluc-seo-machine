title: "Jean-Luc Mederic"
description: "Практические гайды по продажам: лиды, возражения, закрытие. Метод Golden Key of Sales."

# GitHub Pages project site
url: "https://daryahenna.github.io"
baseurl: "/Jean-Luc-Mederic"

permalink: pretty

plugins:
  - jekyll-sitemap

collections:
  guides:
    output: true
    permalink: /guides/:slug/

defaults:
  - scope:
      path: "_guides/ru"
      type: guides
    values:
      lang: ru
      layout: guide
      permalink: /ru/guides/:slug/
  - scope:
      path: "_guides/fr"
      type: guides
    values:
      lang: fr
      layout: guide
      permalink: /fr/guides/:slug/
  - scope:
      path: "_guides/en"
      type: guides
    values:
      lang: en
      layout: guide
      permalink: /en/guides/:slug/
  - scope:
      path: "ru"
    values:
      lang: ru
  - scope:
      path: "fr"
    values:
      lang: fr
  - scope:
      path: "en"
    values:
      lang: en

# Supported languages (used by layouts for hreflang and language switcher)
languages:
  - code: ru
    name: "Русский"
    short: "RU"
  - code: fr
    name: "Français"
    short: "FR"
  - code: en
    name: "English"
    short: "EN"
default_lang: fr

exclude:
  - SESSION.md
  - FILES.md
  - STYLE.md
  - CLAUDE.md
  - extracted
  - prompts
  - research
  - .claude
