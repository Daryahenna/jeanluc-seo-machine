title: "Jean-Luc Mederic"
description: "Практические гайды по продажам: лиды, возражения, закрытие. Метод Golden Key of Sales."

# GitHub Pages project site
url: "https://daryahenna.github.io"
baseurl: "/Jean-Luc-Mederic"

permalink: pretty

plugins:
  - jekyll-sitemap

collections:
  guides:
    output: true
    permalink: /guides/:slug/

defaults:
  - scope:
      path: "_guides/ru"
      type: guides
    values:
      lang: ru
      layout: guide
      permalink: /ru/guides/:slug/
  - scope:
      path: "ru"
    values:
      lang: ru

exclude:
  - SESSION.md
  - FILES.md
  - STYLE.md
  - extracted
